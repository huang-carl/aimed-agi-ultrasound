version: '3.8'

services:
  # ============ 数据库服务 ============
  postgres:
    image: postgres:16-alpine
    container_name: aimed-postgres
    environment:
      POSTGRES_USER: aimed_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: aimed_db
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimed_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: aimed-redis
    command: redis-server --appendonly yes --requirepass dev_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  # ============ Hermes API 服务 ============
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: aimed-hermes
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "18790:18790"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 18790 --reload
  
  # ============ Nginx 反向代理 ============
  nginx:
    image: nginx:alpine
    container_name: aimed-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - hermes
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: aimed-network
