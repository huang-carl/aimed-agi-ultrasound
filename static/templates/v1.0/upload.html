<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIMED 充盈视界 - 图像上传平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .header-nav {
            text-align: center;
            margin-bottom: 15px;
        }
        .header-nav a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.9em;
            transition: all 0.3s;
            margin: 0 5px;
        }
        .header-nav a:hover {
            background: rgba(255,255,255,0.35);
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 上传区域 */
        .upload-zone {
            border: 3px dashed #cbd5e0;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .upload-zone:hover {
            border-color: #667eea;
            background: #f7fafc;
        }
        
        .upload-zone.dragover {
            border-color: #764ba2;
            background: #f0f4ff;
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .upload-zone p {
            color: #718096;
            margin-bottom: 10px;
        }
        
        .upload-zone .hint {
            font-size: 0.9em;
            color: #a0aec0;
        }
        
        #file-input {
            display: none;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        select, input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        select:focus, input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 进度条 */
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-text {
            color: #718096;
            font-size: 0.9em;
            text-align: center;
        }
        
        /* 预览区域 */
        .preview-container {
            margin-top: 20px;
            display: none;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        
        .file-info {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .file-info p {
            color: #4a5568;
            margin-bottom: 5px;
            font-size: 0.95em;
        }
        
        /* 统计面板 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        /* 上传历史 */
        .upload-history {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }
        
        .history-item:hover {
            background: #f7fafc;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            object-fit: cover;
            background: #e2e8f0;
        }
        
        .history-info {
            flex: 1;
        }
        
        .history-info h4 {
            color: #2d3748;
            margin-bottom: 4px;
            font-size: 0.95em;
        }
        
        .history-info p {
            color: #718096;
            font-size: 0.85em;
        }
        
        .history-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }
        
        .badge-stomach {
            background: #fed7d7;
            color: #c53030;
        }
        
        .badge-pancreas {
            background: #c6f6d5;
            color: #276749;
        }
        
        .badge-filled {
            background: #bee3f8;
            color: #2c5282;
        }
        
        .badge-unfilled {
            background: #feebc8;
            color: #c05621;
        }
        
        /* 成功提示 */
        .success-message {
            background: #c6f6d5;
            color: #276749;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }
        
        /* 说明文字 */
        .info-box {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .info-box h4 {
            color: #2b6cb0;
            margin-bottom: 8px;
        }
        
        .info-box ul {
            color: #4a5568;
            padding-left: 20px;
            font-size: 0.95em;
        }
        
        .info-box li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">🏠 官网首页</a>
                <a href="/portal/">🏥 AI 平台</a>
                <a href="/portal/login.html">🔑 登录</a>
            </div>
            <h1>📸 AIMED 充盈视界 - 图像上传平台</h1>
            <p>医学图像训练数据收集系统</p>
        </header>
        
        <div class="main-grid">
            <!-- 左侧：上传表单 -->
            <div class="card">
                <h2>📤 上传图像</h2>
                
                <div class="info-box">
                    <h4>📋 数据收集目标</h4>
                    <ul>
                        <li>胃部图像：25 张（已充盈 15 张 + 未充盈 10 张）</li>
                        <li>胰腺图像：23 张（已充盈 15 张 + 未充盈 8 张）</li>
                        <li>总计：50 张用于模型训练</li>
                    </ul>
                </div>
                
                <div class="upload-zone" id="upload-zone">
                    <div class="upload-icon">📁</div>
                    <p><strong>点击或拖拽上传图像</strong></p>
                    <p class="hint">支持 JPG、PNG、DICOM 格式</p>
                    <input type="file" id="file-input" accept="image/*,.dcm">
                </div>
                
                <div class="preview-container" id="preview-container">
                    <img class="preview-image" id="preview-image" alt="预览">
                    <div class="file-info">
                        <p><strong>文件名：</strong><span id="file-name"></span></p>
                        <p><strong>大小：</strong><span id="file-size"></span></p>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label>🫁 器官类型</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="organ" value="stomach" checked>
                            <span>🫀 胃</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="organ" value="pancreas">
                            <span>🧠 胰腺</span>
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>💧 充盈状态</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="filling" value="filled" checked>
                            <span>✅ 已充盈</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="filling" value="unfilled">
                            <span>⏳ 未充盈</span>
                        </label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>📝 诊断描述</label>
                        <input type="text" id="diagnosis" placeholder="如：胃底部恶性间质瘤">
                    </div>
                    <div class="form-group">
                        <label>🏷️ 备注</label>
                        <input type="text" id="notes" placeholder="可选">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📄 详细描述</label>
                    <textarea id="description" placeholder="详细描述病变特征、位置等信息（可选）"></textarea>
                </div>
                
                <button class="btn" id="upload-btn" disabled>🚀 开始上传</button>
                
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <p class="progress-text" id="progress-text">正在上传...</p>
                </div>
                
                <div class="success-message" id="success-message">
                    ✅ 上传成功！感谢您的贡献～
                </div>
            </div>
            
            <!-- 右侧：统计和历史 -->
            <div class="card">
                <h2>📊 数据统计</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="stat-total">18</div>
                        <div class="stat-label">总收集</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-target">50</div>
                        <div class="stat-label">目标</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-stomach">16</div>
                        <div class="stat-label">胃部</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-pancreas">2</div>
                        <div class="stat-label">胰腺</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📈 进度</label>
                    <div class="progress-bar" style="height: 12px;">
                        <div class="progress-fill" id="total-progress" style="width: 36%;"></div>
                    </div>
                    <p class="progress-text" id="progress-percent">36% 完成</p>
                </div>
                
                <h2 style="margin-top: 30px;">📜 上传历史</h2>
                <div class="upload-history" id="upload-history">
                    <!-- 历史记录会动态加载 -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const BASE_URL = window.location.origin;
        
        // DOM 元素
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const uploadBtn = document.getElementById('upload-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const successMessage = document.getElementById('success-message');
        const uploadHistory = document.getElementById('upload-history');
        
        let selectedFile = null;
        
        // 上传区域点击事件
        uploadZone.addEventListener('click', () => fileInput.click());
        
        // 拖拽事件
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        // 文件选择事件
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        // 处理文件
        function handleFile(file) {
            selectedFile = file;
            
            // 显示预览
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            // 显示文件信息
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            
            // 启用上传按钮
            uploadBtn.disabled = false;
            
            // 隐藏成功消息
            successMessage.style.display = 'none';
        }
        
        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
        
        // 上传按钮点击事件
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            // 获取表单数据
            const organ = document.querySelector('input[name="organ"]:checked').value;
            const filling = document.querySelector('input[name="filling"]:checked').value;
            const diagnosis = document.getElementById('diagnosis').value;
            const notes = document.getElementById('notes').value;
            const description = document.getElementById('description').value;
            
            // 准备上传
            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('organ', organ);
            formData.append('filling_status', filling);
            formData.append('diagnosis', diagnosis);
            formData.append('notes', notes);
            formData.append('description', description);
            
            // 显示进度
            progressContainer.style.display = 'block';
            uploadBtn.disabled = true;
            
            // 模拟上传进度
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += 5;
                if (progress <= 85) {
                    progressFill.style.width = progress + '%';
                    progressText.textContent = `正在上传... ${progress}%`;
                }
            }, 100);
            
            try {
                // 调用实际 API
                const response = await fetch(`${BASE_URL}/api/v1/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                clearInterval(progressInterval);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '上传失败');
                }
                
                const result = await response.json();
                
                progressFill.style.width = '100%';
                progressText.textContent = '上传完成！';
                
                // 显示成功消息
                successMessage.style.display = 'block';
                
                // 添加到历史记录
                addToHistory({
                    organ: organ,
                    filling: filling,
                    diagnosis: result.diagnosis || diagnosis || '待诊断',
                    filename: selectedFile.name,
                    timestamp: new Date().toISOString()
                });
                
                // 更新统计
                updateStats(organ);
                
                // 重置表单
                setTimeout(() => {
                    resetForm();
                }, 2000);
                
            } catch (error) {
                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressText.textContent = `上传失败：${error.message}`;
                progressFill.style.background = '#fc8181';
                uploadBtn.disabled = false;
            }
        });
        
        // 重置表单
        function resetForm() {
            selectedFile = null;
            fileInput.value = '';
            previewContainer.style.display = 'none';
            progressContainer.style.display = 'none';
            progressFill.style.width = '0%';
            progressFill.style.background = '';
            uploadBtn.disabled = true;
            document.getElementById('diagnosis').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('description').value = '';
        }
        
        // 添加到历史记录
        function addToHistory(item) {
            const organLabel = item.organ === 'stomach' ? '胃' : '胰腺';
            const fillingLabel = item.filling === 'filled' ? '已充盈' : '未充盈';
            const organBadge = item.organ === 'stomach' ? 'badge-stomach' : 'badge-pancreas';
            const fillingBadge = item.filling === 'filled' ? 'badge-filled' : 'badge-unfilled';
            
            const html = `
                <div class="history-item">
                    <div class="history-thumbnail"></div>
                    <div class="history-info">
                        <h4>${item.diagnosis}</h4>
                        <p>${item.filename} · ${new Date(item.timestamp).toLocaleString('zh-CN')}</p>
                    </div>
                    <span class="history-badge ${organBadge}">${organLabel}</span>
                    <span class="history-badge ${fillingBadge}">${fillingLabel}</span>
                </div>
            `;
            
            uploadHistory.insertAdjacentHTML('afterbegin', html);
        }
        
        // 更新统计
        function updateStats(organ) {
            const totalEl = document.getElementById('stat-total');
            const stomachEl = document.getElementById('stat-stomach');
            const pancreasEl = document.getElementById('stat-pancreas');
            const totalProgress = document.getElementById('total-progress');
            const progressPercent = document.getElementById('progress-percent');
            
            let total = parseInt(totalEl.textContent);
            let stomach = parseInt(stomachEl.textContent);
            let pancreas = parseInt(pancreasEl.textContent);
            
            total++;
            if (organ === 'stomach') {
                stomach++;
            } else {
                pancreas++;
            }
            
            totalEl.textContent = total;
            stomachEl.textContent = stomach;
            pancreasEl.textContent = pancreas;
            
            const percent = Math.round((total / 50) * 100);
            totalProgress.style.width = percent + '%';
            progressPercent.textContent = `${percent}% 完成`;
        }
        
        // 初始化加载历史记录（模拟数据）
        function loadHistory() {
            const mockHistory = [
                { organ: 'stomach', filling: 'filled', diagnosis: '胃底部恶性间质瘤', filename: 'stomach_016.jpg', timestamp: '2026-04-23T10:30:00' },
                { organ: 'stomach', filling: 'filled', diagnosis: '胃底部恶性间质瘤 A', filename: 'stomach_015.jpg', timestamp: '2026-04-23T10:15:00' },
                { organ: 'stomach', filling: 'filled', diagnosis: '胃底部恶性间质瘤 Ae', filename: 'stomach_014.jpg', timestamp: '2026-04-23T10:00:00' },
                { organ: 'pancreas', filling: 'unfilled', diagnosis: '待诊断', filename: 'pancreas_002.jpg', timestamp: '2026-04-23T09:45:00' },
                { organ: 'pancreas', filling: 'unfilled', diagnosis: '待解析', filename: 'pancreas_001.jpg', timestamp: '2026-04-22T16:20:00' },
            ];
            
            mockHistory.forEach(item => addToHistory(item));
        }
        
        // 页面加载时初始化
        loadHistory();
    </script>
</body>
</html>
