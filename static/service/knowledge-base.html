<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库 - 超声造影人工智能诊断联合实验室</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f1f5f9;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        /* 导航栏 */
        .navbar {
            background: var(--white);
            border-bottom: 1px solid #e2e8f0;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            font-size: 1.1em;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--gray);
            font-size: 0.9em;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
            background: #eff6ff;
        }
        .nav-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-logout {
            padding: 6px 16px;
            background: #fee2e2;
            color: var(--danger);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: #fecaca; }

        /* 主内容 */
        .main-container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        /* 搜索区 */
        .search-hero {
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            border-radius: 16px;
            padding: 48px 40px;
            color: white;
            text-align: center;
            margin-bottom: 32px;
        }
        .search-hero h1 { font-size: 2em; margin-bottom: 8px; }
        .search-hero p { opacity: 0.9; margin-bottom: 24px; }
        .search-box {
            display: flex;
            max-width: 600px;
            margin: 0 auto 16px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
        }
        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            font-size: 1em;
            outline: none;
        }
        .search-box button {
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        .search-tags { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .search-tag {
            padding: 4px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-tag:hover { background: rgba(255,255,255,0.3); }

        /* 分类导航 */
        .category-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 8px 20px;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .category-btn:hover, .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 文档列表 */
        .doc-list { display: flex; flex-direction: column; gap: 12px; }
        .doc-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px 24px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .doc-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(37,99,235,0.1);
            transform: translateY(-2px);
        }
        .doc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .doc-icon {
            width: 40px; height: 40px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2em;
        }
        .doc-title { font-weight: 600; font-size: 1.05em; }
        .doc-meta { display: flex; gap: 16px; font-size: 0.85em; color: var(--gray); }
        .doc-tag {
            display: inline-block;
            padding: 2px 8px;
            background: #eff6ff;
            color: var(--primary);
            border-radius: 4px;
            font-size: 0.8em;
        }
        .doc-summary { color: var(--gray); font-size: 0.9em; margin-top: 8px; }

        /* 文档详情模态 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1.2em;
        }
        .modal-body { line-height: 1.8; }
        .modal-body h3 { margin: 20px 0 12px; color: var(--primary); }
        .modal-body p { margin-bottom: 12px; color: #374151; }
        .modal-body ul { margin: 12px 0; padding-left: 24px; }
        .modal-body li { margin-bottom: 6px; }

        /* 统计 */
        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .stat-number { font-size: 1.8em; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.85em; color: var(--gray); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        .empty-state .icon { font-size: 3em; margin-bottom: 16px; }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--gray);
            font-size: 0.85em;
            border-top: 1px solid #e2e8f0;
            margin-top: 40px;
        }
        .footer a { color: var(--primary); text-decoration: none; }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .search-hero { padding: 32px 20px; }
            .search-hero h1 { font-size: 1.5em; }
            .category-nav { gap: 8px; }
            .category-btn { padding: 6px 14px; font-size: 0.85em; }
            .stats-bar { gap: 12px; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">🏥 联合实验室</a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="doctor.html">医生工作台</a></li>
            <li><a href="patient.html">用户咨询台</a></li>
            <li><a href="blockchain-identity.html">区块链身份</a></li>
            <li><a href="digital-assets.html">数字资产</a></li>
            <li><a href="knowledge-base.html" class="active">知识库</a></li>
            <li><a href="developer.html">API 文档</a></li>
        </ul>
        <div class="nav-user">
            <span id="navUsername">👤 用户</span>
            <button class="btn-logout" onclick="logout()">退出</button>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-container">
        <!-- 搜索区 -->
        <div class="search-hero">
            <h1>📚 统一知识库</h1>
            <p>AIMED 智慧医疗生态全方位知识体系 — 医疗诊断 · 产品知识 · 技术文档 · 合规认证</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索知识文档..." onkeydown="if(event.key==='Enter')doSearch()">
                <button onclick="doSearch()">🔍 搜索</button>
            </div>
            <div class="search-tags">
                <span class="search-tag" onclick="quickSearch('造影剂')">造影剂</span>
                <span class="search-tag" onclick="quickSearch('龙脑')">龙脑</span>
                <span class="search-tag" onclick="quickSearch('API')">API</span>
                <span class="search-tag" onclick="quickSearch('诊断')">诊断</span>
                <span class="search-tag" onclick="quickSearch('培训')">培训</span>
            </div>
        </div>

        <!-- 统计 -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-number" id="statTotal">-</div>
                <div class="stat-label">文档总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statCategories">-</div>
                <div class="stat-label">知识分类</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statViews">-</div>
                <div class="stat-label">总浏览量</div>
            </div>
        </div>

        <!-- 分类导航 -->
        <div class="category-nav" id="categoryNav">
            <button class="category-btn active" onclick="filterCategory('')">全部</button>
        </div>

        <!-- 文档列表 -->
        <div class="doc-list" id="docList">
            <div class="empty-state">
                <div class="icon">📚</div>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <!-- 文档详情模态 -->
    <div class="modal-overlay" id="docModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">文档标题</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        © 2026 阿尔麦德智慧医疗（湖州）有限公司 |
        <a href="../index.html">官网</a> ·
        <a href="developer.html">API 文档</a> ·
        <a href="blockchain-identity.html">区块链身份</a>
    </div>

    <script>
        // 登录检查
        (function() {
            const loginStatus = localStorage.getItem('loginStatus');
            if (!loginStatus) {
                window.location.href = 'login.html?redirect=portal/knowledge-base.html';
                return;
            }
            try {
                const data = JSON.parse(loginStatus);
                document.getElementById('navUsername').textContent = '👤 ' + (data.username || data.roleLabel || '用户');
            } catch(e) { localStorage.removeItem('loginStatus'); }
        })();

        function logout() {
            localStorage.removeItem('loginStatus');
            window.location.href = 'login.html';
        }

        // 分类映射
        const CATEGORY_MAP = {
            'medical': { name: '医疗诊断', icon: '🏥', color: '#2563eb' },
            'product': { name: '产品知识', icon: '📦', color: '#10b981' },
            'technology': { name: '技术文档', icon: '🔧', color: '#8b5cf6' },
            'compliance': { name: '合规认证', icon: '📋', color: '#f59e0b' },
            'sales': { name: '销售支持', icon: '💼', color: '#ec4899' },
            'research': { name: '科研合作', icon: '🎓', color: '#06b6d4' },
        };

        let allDocs = [];
        let currentCategory = '';

        // 加载分类
        async function loadCategories() {
            try {
                const res = await fetch('/api/v1/kb/categories');
                const data = await res.json();
                const nav = document.getElementById('categoryNav');
                for (const [key, cat] of Object.entries(data.categories)) {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.textContent = cat.icon + ' ' + cat.name;
                    btn.onclick = () => filterCategory(key);
                    nav.appendChild(btn);
                }
            } catch(e) { console.error('加载分类失败:', e); }
        }

        // 加载文档列表
        async function loadDocuments(category) {
            const list = document.getElementById('docList');
            list.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>加载中...</p></div>';

            try {
                let url = '/api/v1/kb/list';
                if (category) url += '?category=' + category;

                const token = localStorage.getItem('jwt_token');
                const headers = {};
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const res = await fetch(url, { headers });
                const data = await res.json();
                allDocs = data.documents || [];

                renderDocs(allDocs);
            } catch(e) {
                list.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载失败：' + e.message + '</p></div>';
            }
        }

        // 渲染文档列表
        function renderDocs(docs) {
            const list = document.getElementById('docList');
            if (docs.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无文档</p></div>';
                return;
            }

            list.innerHTML = docs.map(doc => {
                const cat = CATEGORY_MAP[doc.category] || { name: doc.category, icon: '📄', color: '#64748b' };
                const tags = (doc.tags || []).map(t => '<span class="doc-tag">' + t + '</span>').join(' ');
                return `
                    <div class="doc-card" onclick="openDoc('${doc.id}')">
                        <div class="doc-header">
                            <div class="doc-icon" style="background:${cat.color}20;color:${cat.color};">${cat.icon}</div>
                            <div>
                                <div class="doc-title">${escapeHtml(doc.title)}</div>
                                <div class="doc-meta">
                                    <span>${cat.name}</span>
                                    <span>👁 ${doc.views || 0} 次浏览</span>
                                    <span>📅 ${doc.created_at ? doc.created_at.slice(0,10) : '-'}</span>
                                </div>
                            </div>
                        </div>
                        <div style="margin-top:8px;">${tags}</div>
                        <div class="doc-summary">${escapeHtml(doc.summary || doc.content || '').slice(0, 120)}${(doc.summary || doc.content || '').length > 120 ? '...' : ''}</div>
                    </div>
                `;
            }).join('');
        }

        // 分类过滤
        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim() === (cat ? '' : '全部'));
            });
            loadDocuments(cat);
        }

        // 搜索
        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) { loadDocuments(currentCategory); return; }

            const list = document.getElementById('docList');
            list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>搜索中...</p></div>';

            try {
                const token = localStorage.getItem('jwt_token');
                const headers = {};
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const res = await fetch('/api/v1/kb/search?q=' + encodeURIComponent(q) + (currentCategory ? '&category=' + currentCategory : ''), { headers });
                const data = await res.json();
                allDocs = data.documents || [];
                renderDocs(allDocs);
            } catch(e) {
                list.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>搜索失败：' + e.message + '</p></div>';
            }
        }

        function quickSearch(q) {
            document.getElementById('searchInput').value = q;
            doSearch();
        }

        // 打开文档详情
        async function openDoc(id) {
            const modal = document.getElementById('docModal');
            modal.classList.add('show');

            document.getElementById('modalTitle').textContent = '加载中...';
            document.getElementById('modalBody').innerHTML = '<p>加载中...</p>';

            try {
                const token = localStorage.getItem('jwt_token');
                const headers = {};
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const res = await fetch('/api/v1/kb/' + id, { headers });
                const doc = await res.json();

                document.getElementById('modalTitle').textContent = doc.title;
                const cat = CATEGORY_MAP[doc.category] || { name: doc.category, icon: '📄' };
                const tags = (doc.tags || []).map(t => '<span class="doc-tag">' + t + '</span>').join(' ');

                document.getElementById('modalBody').innerHTML = `
                    <div style="margin-bottom:16px;">
                        <span class="doc-tag">${cat.icon} ${cat.name}</span>
                        ${tags}
                    </div>
                    <div style="font-size:0.85em;color:var(--gray);margin-bottom:16px;">
                        📅 ${doc.created_at ? doc.created_at.slice(0,10) : '-'} · 👁 ${doc.views || 0} 次浏览 · ✍️ ${doc.author || '-'} · 🏢 ${doc.company || '-'}
                    </div>
                    <div style="line-height:1.8;">${escapeHtml(doc.content || doc.summary || '暂无内容')}</div>
                `;
            } catch(e) {
                document.getElementById('modalBody').innerHTML = '<p style="color:var(--danger);">加载失败：' + e.message + '</p>';
            }
        }

        function closeModal() {
            document.getElementById('docModal').classList.remove('show');
        }

        // 加载统计
        async function loadStats() {
            try {
                const token = localStorage.getItem('jwt_token');
                const headers = {};
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const res = await fetch('/api/v1/kb/stats', { headers });
                const data = await res.json();
                document.getElementById('statTotal').textContent = data.total_documents || 0;
                document.getElementById('statCategories').textContent = Object.keys(data.by_category || {}).length;
                document.getElementById('statViews').textContent = data.total_views || 0;
            } catch(e) { console.error('加载统计失败:', e); }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击模态外部关闭
        document.getElementById('docModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 初始化
        loadCategories();
        loadDocuments('');
        loadStats();
    </script>
<script src="/aimed-bot.js"></script></body>
</html>
