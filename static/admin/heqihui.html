<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0071e3; --dark: #1d1d1f; --gray: #86868b; --light: #f5f5f7; --white: #fff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: var(--light); color: var(--dark); line-height: 1.5; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 24px 0; z-index: 100; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 24px; }
        .sidebar-logo img { height: 40px; }
        .sidebar-logo-text { font-size: 1.1em; font-weight: 600; }
        .sidebar-logo-text small { display: block; font-size: 0.75em; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .nav-section { padding: 0 12px; margin-bottom: 24px; }
        .nav-section-title { font-size: 0.75em; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 12px; margin-bottom: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item .icon { font-size: 1.3em; width: 24px; text-align: center; }
        .main-content { margin-left: 260px; padding: 30px; }
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 1.8em; font-weight: 700; margin-bottom: 6px; }
        .page-header p { color: var(--gray); font-size: 0.95em; }
        .card { background: var(--white); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card h2 { font-size: 1.2em; font-weight: 600; margin-bottom: 16px; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .info-item { padding: 16px; background: var(--light); border-radius: 10px; }
        .info-item .label { font-size: 0.85em; color: var(--gray); margin-bottom: 4px; }
        .info-item .value { font-size: 1.1em; font-weight: 600; }
        .btn { padding: 8px 16px; border-radius: 10px; border: none; font-size: 0.85em; font-weight: 500; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
