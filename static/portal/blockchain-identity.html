<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块链身份识别 - AIMED 充盈视界</title>
    <link rel="icon" type="image/jpeg" href="../aimed-logo-new.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --accent: #8b5cf6;
            --dark: #1e293b;
            --light: #f8fafc;
            --text: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: var(--text);
            line-height: 1.6;
        }

        /* 导航栏 */
        .navbar {
            background: white;
            box-shadow: var(--shadow);
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
        }
        .nav-logo img { height: 36px; }
        .nav-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.9em;
        }
        .nav-breadcrumb a { color: var(--primary); text-decoration: none; }

        /* 主容器 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px 30px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .status-item {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            flex: 1;
            min-width: 200px;
            box-shadow: var(--shadow);
        }
        .status-item .label {
            font-size: 0.85em;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        .status-item .value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--dark);
        }
        .status-item .value.verified { color: var(--success); }
        .status-item .value.pending { color: var(--warning); }

        /* 工作区 */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; }
        }

        /* 卡片 */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h3 {
            font-size: 1.05em;
            color: var(--dark);
        }
        .card-body {
            padding: 22px;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--dark);
            font-size: 0.9em;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-block {
            width: 100%;
            justify-content: center;
            padding: 12px;
            font-size: 1em;
        }

        /* 身份卡片 */
        .identity-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 25px;
            color: white;
            margin-bottom: 20px;
        }
        .identity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .identity-header h3 {
            font-size: 1.2em;
        }
        .identity-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        .identity-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .identity-row:last-child { border-bottom: none; }
        .identity-row .label { opacity: 0.8; font-size: 0.9em; }
        .identity-row .value { font-weight: 600; }

        /* 区块链信息 */
        .blockchain-info {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 10px;
            padding: 18px;
            margin-top: 15px;
        }
        .blockchain-info h4 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 0.95em;
        }
        .hash-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0f2fe;
            font-size: 0.85em;
            word-break: break-all;
        }
        .hash-row .label { color: var(--text-light); min-width: 80px; }
        .hash-row .value { font-family: monospace; color: var(--dark); }

        /* 全宽卡片 */
        .card-full {
            grid-column: 1 / -1;
        }

        /* 占位 */
        .placeholder {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .placeholder .icon { font-size: 3em; margin-bottom: 15px; opacity: 0.4; }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            border-radius: 10px;
            padding: 14px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 320px;
            font-size: 0.9em;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--primary); }

        /* 免责声明 */
        .disclaimer {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 12px 15px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #92400e;
        }
        .disclaimer strong { color: #b45309; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/portal/" class="nav-logo">
                <img src="../aimed-logo-new.jpg" alt="AIMED">
                <span>AIMED 充盈视界</span>
            </a>
            <div class="nav-breadcrumb">
                <a href="/portal/">AI 平台</a>
                <span>›</span>
                <span>区块链身份识别</span>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <div class="label">区块链网络</div>
                <div class="value" id="status-network">检测中...</div>
            </div>
            <div class="status-item">
                <div class="label">身份状态</div>
                <div class="value pending" id="status-identity">未验证</div>
            </div>
            <div class="status-item">
                <div class="label">已注册身份</div>
                <div class="value" id="status-count">0</div>
            </div>
            <div class="status-item">
                <div class="label">交易确认</div>
                <div class="value" id="status-confirm">--</div>
            </div>
        </div>

        <!-- 工作区 -->
        <div class="workspace">
            <!-- 左侧：身份注册 -->
            <div class="card">
                <div class="card-header">
                    <h3>🔐 身份注册</h3>
                    <span style="font-size:0.85em;color:var(--text-light)">区块链存证</span>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>身份类型 *</label>
                        <select id="identityType">
                            <option value="doctor">👨‍⚕️ 医生</option>
                            <option value="patient">👤 患者</option>
                            <option value="developer">👨‍💻 开发者</option>
                            <option value="admin">⚙️ 管理员</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>姓名/机构名称 *</label>
                        <input type="text" id="name" placeholder="请输入真实姓名或机构名称">
                    </div>
                    <div class="form-group">
                        <label>执业证书/注册号（可选）</label>
                        <input type="text" id="certificate" placeholder="医生执业证书号/机构注册号">
                    </div>
                    <div class="form-group">
                        <label>联系方式 *</label>
                        <input type="email" id="contact" placeholder="邮箱或手机号">
                    </div>
                    <div class="form-group">
                        <label>补充说明（可选）</label>
                        <textarea id="extraInfo" placeholder="专业领域、职称、科室等..." style="min-height:70px"></textarea>
                    </div>
                    <button class="btn btn-primary btn-block" id="registerBtn" onclick="registerIdentity()">
                        🔗 注册到区块链
                    </button>
                </div>
            </div>

            <!-- 右侧：身份卡片 -->
            <div class="card">
                <div class="card-header">
                    <h3>🪪 数字身份</h3>
                    <button class="btn btn-secondary" onclick="exportIdentity()" style="font-size:0.85em;padding:6px 14px">📤 导出</button>
                </div>
                <div class="card-body" id="identityArea">
                    <div class="placeholder">
                        <div class="icon">🔐</div>
                        <p>完成身份注册后，将生成区块链数字身份</p>
                        <p style="font-size:0.85em;margin-top:8px">身份数据上链存证，不可篡改</p>
                    </div>
                </div>
            </div>

            <!-- 底部：区块链信息 -->
            <div class="card card-full">
                <div class="card-header">
                    <h3>⛓️ 区块链存证信息</h3>
                    <button class="btn btn-secondary" onclick="verifyIdentity()" style="font-size:0.85em;padding:6px 14px">✅ 验证身份</button>
                </div>
                <div class="card-body" id="blockchainArea">
                    <div class="placeholder">
                        <div class="icon">⛓️</div>
                        <p>身份注册后，区块链交易信息将显示在此处</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 免责声明 -->
        <div class="disclaimer">
            <strong>⚠️ 说明：</strong>区块链身份识别用于确保医疗数据安全和身份真实性。Phase 1 阶段为模拟环境，实际部署将接入联盟链（如蚂蚁链、长安链等）。
        </div>
    </div>

    <script>
        // 身份数据
        let currentIdentity = null;
        let identityHistory = JSON.parse(localStorage.getItem('identityHistory') || '[]');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkBlockchainStatus();
            loadLastIdentity();
        });

        // 检查区块链状态
        async function checkBlockchainStatus() {
            // 模拟状态检查
            document.getElementById('status-network').textContent = '✅ 已连接';
            document.getElementById('status-network').className = 'value verified';
        }

        // 加载最后身份
        function loadLastIdentity() {
            if (identityHistory.length > 0) {
                currentIdentity = identityHistory[0];
                showIdentity(currentIdentity);
                showBlockchainInfo(currentIdentity);
            }
        }

        // 注册身份
        async function registerIdentity() {
            const type = document.getElementById('identityType').value;
            const name = document.getElementById('name').value.trim();
            const certificate = document.getElementById('certificate').value.trim();
            const contact = document.getElementById('contact').value.trim();
            const extra = document.getElementById('extraInfo').value.trim();

            if (!name || !contact) {
                showToast('请填写姓名和联系方式', 'error');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:3px;margin:0"></span> 上链中...';

            try {
                // 调用 Hermes 后端区块链 API
                const response = await fetch('/api/v1/blockchain/did/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: name,
                        user_type: type,
                        metadata: {
                            name: name,
                            certificate: certificate,
                            contact: contact,
                            extra: extra
                        }
                    })
                });

                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.detail || '注册失败');
                }

                // 构造身份对象
                const identity = {
                    id: result.data.did,
                    type: getTypeLabel(type),
                    name: name,
                    certificate: certificate,
                    contact: contact,
                    extra: extra,
                    timestamp: result.data.timestamp,
                    txHash: result.data.tx_hash,
                    blockNumber: null,
                    confirmations: null,
                    status: 'verified',
                    chain: result.data.chain,
                    did: result.data.did
                };

                currentIdentity = identity;
                identityHistory.unshift(identity);
                if (identityHistory.length > 10) identityHistory.pop();
                localStorage.setItem('identityHistory', JSON.stringify(identityHistory));

                showIdentity(identity);
                showBlockchainInfo(identity);
                updateStatus(identity);
                showToast('✅ 身份已成功注册到区块链！', 'success');
            } catch (e) {
                showToast('注册失败：' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔗 注册到区块链';
            }
        }

        // 显示身份卡片
        function showIdentity(identity) {
            document.getElementById('identityArea').innerHTML = `
                <div class="identity-card">
                    <div class="identity-header">
                        <h3>🪪 ${identity.type}</h3>
                        <span class="identity-badge">✅ 已验证</span>
                    </div>
                    <div class="identity-row">
                        <span class="label">姓名/机构</span>
                        <span class="value">${identity.name}</span>
                    </div>
                    <div class="identity-row">
                        <span class="label">证书/注册号</span>
                        <span class="value">${identity.certificate || '未填写'}</span>
                    </div>
                    <div class="identity-row">
                        <span class="label">联系方式</span>
                        <span class="value">${identity.contact}</span>
                    </div>
                    <div class="identity-row">
                        <span class="label">身份 ID</span>
                        <span class="value" style="font-family:monospace;font-size:0.85em">${identity.id}</span>
                    </div>
                    <div class="identity-row">
                        <span class="label">注册时间</span>
                        <span class="value">${new Date(identity.timestamp).toLocaleString('zh-CN')}</span>
                    </div>
                </div>
            `;
        }

        // 显示区块链信息
        function showBlockchainInfo(identity) {
            const chainName = identity.chain === 'tencent_zhixin' ? '腾讯至信链' : 
                             identity.chain === 'antchain' ? '蚂蚁链' : 
                             identity.chain === 'fisco_bcos' ? 'FISCO BCOS' : 'AIMED Testnet';
            
            document.getElementById('blockchainArea').innerHTML = `
                <div class="blockchain-info">
                    <h4>⛓️ 链上存证信息</h4>
                    <div class="hash-row">
                        <span class="label">DID</span>
                        <span class="value" style="font-size:0.85em;word-break:break-all;">${identity.did || identity.id}</span>
                    </div>
                    <div class="hash-row">
                        <span class="label">交易哈希</span>
                        <span class="value" style="font-size:0.85em;word-break:break-all;">${identity.txHash}</span>
                    </div>
                    <div class="hash-row">
                        <span class="label">区块高度</span>
                        <span class="value">${identity.blockNumber || '待确认'}</span>
                    </div>
                    <div class="hash-row">
                        <span class="label">确认数</span>
                        <span class="value">${identity.confirmations || '待确认'} 个确认</span>
                    </div>
                    <div class="hash-row">
                        <span class="label">网络</span>
                        <span class="value">${chainName}</span>
                    </div>
                    <div class="hash-row">
                        <span class="label">存证内容</span>
                        <span class="value">${identity.type} - ${identity.name}</span>
                    </div>
                </div>
            `;
        }

        // 更新状态
        function updateStatus(identity) {
            document.getElementById('status-identity').textContent = '✅ 已验证';
            document.getElementById('status-identity').className = 'value verified';
            document.getElementById('status-count').textContent = identityHistory.length;
            document.getElementById('status-confirm').textContent = identity.confirmations + ' 个';
        }

        // 导出身份
        function exportIdentity() {
            if (!currentIdentity) {
                showToast('没有可导出的身份', 'error');
                return;
            }
            const blob = new Blob([JSON.stringify(currentIdentity, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `identity_${currentIdentity.id}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('身份已导出', 'success');
        }

        // 验证身份
        function verifyIdentity() {
            if (!currentIdentity) {
                showToast('请先注册身份', 'error');
                return;
            }
            showToast('✅ 身份验证通过 - 链上数据一致', 'success');
        }

        // 工具函数
        function generateId() {
            return 'ID-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        function generateTxHash() {
            const chars = '0123456789abcdef';
            let hash = '0x';
            for (let i = 0; i < 64; i++) {
                hash += chars[Math.floor(Math.random() * chars.length)];
            }
            return hash;
        }

        function getTypeLabel(type) {
            const labels = {
                'doctor': '👨‍⚕️ 医生',
                'patient': '👤 患者',
                'developer': '👨‍💻 开发者',
                'admin': '⚙️ 管理员'
            };
            return labels[type] || type;
        }

        // Toast
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
<script src="/aimed-bot.js"></script></body>
</html>
