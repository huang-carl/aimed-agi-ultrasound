<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字资产管理 - AIMED 充盈视界</title>
    <link rel="icon" type="image/jpeg" href="../aimed-logo-new.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --accent: #8b5cf6;
            --dark: #1e293b;
            --light: #f8fafc;
            --text: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: var(--text);
            line-height: 1.6;
        }

        /* 导航栏 */
        .navbar {
            background: white;
            box-shadow: var(--shadow);
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
        }
        .nav-logo img { height: 36px; }
        .nav-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.9em;
        }
        .nav-breadcrumb a { color: var(--primary); text-decoration: none; }

        /* 主容器 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px 30px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .status-item {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            flex: 1;
            min-width: 180px;
            box-shadow: var(--shadow);
        }
        .status-item .label {
            font-size: 0.85em;
            color: var(--text-light);
            margin-bottom: 5px;
        }
        .status-item .value {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--dark);
        }

        /* 工作区 */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; }
        }

        /* 卡片 */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header h3 {
            font-size: 1.05em;
            color: var(--dark);
        }
        .card-body {
            padding: 22px;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--dark);
            font-size: 0.9em;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafbfc;
        }
        .upload-zone:hover {
            border-color: var(--primary);
            background: #f0f7ff;
        }
        .upload-zone.has-file {
            border-color: var(--success);
            background: #f0fdf4;
        }
        .upload-zone .icon { font-size: 2em; margin-bottom: 8px; }
        .upload-zone .text { color: var(--text-light); font-size: 0.85em; }
        .upload-zone .filename {
            margin-top: 8px;
            font-weight: 600;
            color: var(--success);
            font-size: 0.9em;
        }
        #fileInput { display: none; }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-block {
            width: 100%;
            justify-content: center;
            padding: 12px;
            font-size: 1em;
        }

        /* 资产卡片 */
        .asset-card {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 16px;
            padding: 25px;
            color: white;
            margin-bottom: 20px;
        }
        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .asset-header h3 { font-size: 1.1em; }
        .asset-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        .asset-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9em;
        }
        .asset-row:last-child { border-bottom: none; }
        .asset-row .label { opacity: 0.85; }
        .asset-row .value { font-weight: 600; }

        /* 资产列表 */
        .asset-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .asset-item:last-child { border-bottom: none; }
        .asset-info h5 { font-size: 0.95em; color: var(--dark); margin-bottom: 4px; }
        .asset-info p { font-size: 0.8em; color: var(--text-light); }
        .asset-actions {
            display: flex;
            gap: 8px;
        }
        .asset-actions .btn {
            padding: 6px 12px;
            font-size: 0.8em;
        }

        /* 全宽卡片 */
        .card-full {
            grid-column: 1 / -1;
        }

        /* 占位 */
        .placeholder {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .placeholder .icon { font-size: 3em; margin-bottom: 15px; opacity: 0.4; }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            border-radius: 10px;
            padding: 14px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 320px;
            font-size: 0.9em;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--primary); }

        /* 免责声明 */
        .disclaimer {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 12px 15px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #92400e;
        }
        .disclaimer strong { color: #b45309; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/portal/" class="nav-logo">
                <img src="../aimed-logo-new.jpg" alt="AIMED">
                <span>AIMED 充盈视界</span>
            </a>
            <div class="nav-breadcrumb">
                <a href="/portal/">AI 平台</a>
                <span>›</span>
                <span>数字资产管理</span>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <div class="label">数字资产总数</div>
                <div class="value" id="status-total">0</div>
            </div>
            <div class="status-item">
                <div class="label">诊断报告</div>
                <div class="value" id="status-reports">0</div>
            </div>
            <div class="status-item">
                <div class="label">影像文件</div>
                <div class="value" id="status-images">0</div>
            </div>
            <div class="status-item">
                <div class="label">链上存证</div>
                <div class="value" id="status-onchain">0</div>
            </div>
        </div>

        <!-- 工作区 -->
        <div class="workspace">
            <!-- 左侧：创建资产 -->
            <div class="card">
                <div class="card-header">
                    <h3>📦 创建数字资产</h3>
                    <span style="font-size:0.85em;color:var(--text-light)">NFT 化存证</span>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>资产类型 *</label>
                        <select id="assetType">
                            <option value="report">📋 诊断报告</option>
                            <option value="image">🖼️ 影像文件</option>
                            <option value="data">📊 数据集</option>
                            <option value="certificate">🏆 证书/资质</option>
                            <option value="research">🔬 研究成果</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>资产名称 *</label>
                        <input type="text" id="assetName" placeholder="例如：2026 年 Q1 胃诊断报告">
                    </div>
                    <div class="form-group">
                        <label>资产描述</label>
                        <textarea id="assetDesc" placeholder="详细描述资产内容、用途等..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>关联文件（可选）</label>
                        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                            <div class="icon">📁</div>
                            <div class="text">点击上传或拖拽文件到此处</div>
                            <div class="filename" id="fileName"></div>
                        </div>
                        <input type="file" id="fileInput" accept="*/*">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="onchainCheck" checked>
                            同步到区块链存证
                        </label>
                    </div>
                    <button class="btn btn-primary btn-block" id="createBtn" onclick="createAsset()">
                        🔗 创建数字资产
                    </button>
                </div>
            </div>

            <!-- 右侧：最新资产 -->
            <div class="card">
                <div class="card-header">
                    <h3>💎 最新资产</h3>
                    <button class="btn btn-secondary" onclick="exportAsset()" style="font-size:0.85em;padding:6px 14px">📤 导出</button>
                </div>
                <div class="card-body" id="assetArea">
                    <div class="placeholder">
                        <div class="icon">💎</div>
                        <p>创建数字资产后，将在此处展示</p>
                        <p style="font-size:0.85em;margin-top:8px">支持诊断报告、影像文件、数据集等</p>
                    </div>
                </div>
            </div>

            <!-- 底部：资产列表 -->
            <div class="card card-full">
                <div class="card-header">
                    <h3>📚 我的数字资产</h3>
                    <div>
                        <button class="btn btn-secondary" onclick="filterAssets('all')" style="font-size:0.85em;padding:6px 14px">全部</button>
                        <button class="btn btn-secondary" onclick="filterAssets('report')" style="font-size:0.85em;padding:6px 14px">报告</button>
                        <button class="btn btn-secondary" onclick="filterAssets('image')" style="font-size:0.85em;padding:6px 14px">影像</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="asset-list" id="assetList">
                        <div class="placeholder" style="padding:20px">
                            <p style="color:var(--text-light)">暂无数字资产</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 免责声明 -->
        <div class="disclaimer">
            <strong>⚠️ 说明：</strong>数字资产基于区块链技术进行存证，确保数据不可篡改、可追溯。Phase 1 阶段为模拟环境，实际部署将接入联盟链。
        </div>
    </div>

    <script>
        // 资产数据
        let assets = JSON.parse(localStorage.getItem('digitalAssets') || '[]');
        let currentAsset = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderAssets();
            setupFileUpload();
        });

        // 文件上传
        function setupFileUpload() {
            const fileInput = document.getElementById('fileInput');
            const uploadZone = document.getElementById('uploadZone');
            
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    document.getElementById('fileName').textContent = `📎 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
                    uploadZone.classList.add('has-file');
                }
            });

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = 'var(--primary)';
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.style.borderColor = '';
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = '';
                if (e.dataTransfer.files.length > 0) {
                    fileInput.files = e.dataTransfer.files;
                    fileInput.dispatchEvent(new Event('change'));
                }
            });
        }

        // 创建资产
        async function createAsset() {
            const type = document.getElementById('assetType').value;
            const name = document.getElementById('assetName').value.trim();
            const desc = document.getElementById('assetDesc').value.trim();
            const onchain = document.getElementById('onchainCheck').checked;

            if (!name) {
                showToast('请填写资产名称', 'error');
                return;
            }

            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:3px;margin:0"></span> 创建中...';

            try {
                const asset = {
                    id: generateAssetId(),
                    type: getTypeLabel(type),
                    typeKey: type,
                    name: name,
                    description: desc,
                    onchain: onchain,
                    txHash: onchain ? generateTxHash() : null,
                    blockNumber: onchain ? Math.floor(Math.random() * 1000000) + 10000000 : null,
                    timestamp: new Date().toISOString(),
                    status: 'active'
                };

                assets.unshift(asset);
                if (assets.length > 50) assets.pop();
                localStorage.setItem('digitalAssets', JSON.stringify(assets));

                currentAsset = asset;
                showAsset(asset);
                renderAssets();
                updateStatus();
                showToast('数字资产创建成功', 'success');

                // 清空表单
                document.getElementById('assetName').value = '';
                document.getElementById('assetDesc').value = '';
                document.getElementById('fileName').textContent = '';
                document.getElementById('uploadZone').classList.remove('has-file');
            } catch (e) {
                showToast('创建失败：' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔗 创建数字资产';
            }
        }

        // 显示资产
        function showAsset(asset) {
            const color = asset.typeKey === 'report' ? '#2563eb' : 
                         asset.typeKey === 'image' ? '#10b981' :
                         asset.typeKey === 'data' ? '#8b5cf6' :
                         asset.typeKey === 'certificate' ? '#f59e0b' : '#ef4444';
            
            document.getElementById('assetArea').innerHTML = `
                <div class="asset-card" style="background:linear-gradient(135deg, ${color} 0%, ${color}dd 100%)">
                    <div class="asset-header">
                        <h3>${asset.type}</h3>
                        <span class="asset-badge">${asset.onchain ? '⛓️ 已上链' : '📦 本地'}</span>
                    </div>
                    <div class="asset-row">
                        <span class="label">资产名称</span>
                        <span class="value">${asset.name}</span>
                    </div>
                    ${asset.description ? `<div class="asset-row">
                        <span class="label">描述</span>
                        <span class="value" style="font-weight:400;font-size:0.85em">${asset.description}</span>
                    </div>` : ''}
                    <div class="asset-row">
                        <span class="label">资产 ID</span>
                        <span class="value" style="font-family:monospace;font-size:0.8em">${asset.id}</span>
                    </div>
                    <div class="asset-row">
                        <span class="label">创建时间</span>
                        <span class="value">${new Date(asset.timestamp).toLocaleString('zh-CN')}</span>
                    </div>
                    ${asset.txHash ? `<div class="asset-row">
                        <span class="label">交易哈希</span>
                        <span class="value" style="font-family:monospace;font-size:0.75em">${asset.txHash.substring(0, 20)}...</span>
                    </div>` : ''}
                </div>
            `;
        }

        // 渲染资产列表
        function renderAssets(filter = 'all') {
            const list = document.getElementById('assetList');
            const filtered = filter === 'all' ? assets : assets.filter(a => a.typeKey === filter);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="placeholder" style="padding:20px"><p style="color:var(--text-light)">暂无数字资产</p></div>';
                return;
            }

            list.innerHTML = filtered.map(a => `
                <div class="asset-item">
                    <div class="asset-info">
                        <h5>${a.type} - ${a.name}</h5>
                        <p>${new Date(a.timestamp).toLocaleString('zh-CN')} ${a.onchain ? '⛓️' : '📦'}</p>
                    </div>
                    <div class="asset-actions">
                        <button class="btn btn-secondary" onclick="viewAsset('${a.id}')">查看</button>
                        <button class="btn btn-secondary" onclick="deleteAsset('${a.id}')" style="color:var(--danger)">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 查看资产
        function viewAsset(id) {
            const asset = assets.find(a => a.id === id);
            if (asset) {
                currentAsset = asset;
                showAsset(asset);
                showToast('已加载资产详情', 'info');
            }
        }

        // 删除资产
        function deleteAsset(id) {
            if (confirm('确定删除此数字资产？')) {
                assets = assets.filter(a => a.id !== id);
                localStorage.setItem('digitalAssets', JSON.stringify(assets));
                renderAssets();
                updateStatus();
                showToast('资产已删除', 'info');
            }
        }

        // 筛选资产
        function filterAssets(type) {
            renderAssets(type);
        }

        // 导出资产
        function exportAsset() {
            if (!currentAsset) {
                showToast('没有可导出的资产', 'error');
                return;
            }
            const blob = new Blob([JSON.stringify(currentAsset, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `asset_${currentAsset.id}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('资产已导出', 'success');
        }

        // 更新状态
        function updateStatus() {
            document.getElementById('status-total').textContent = assets.length;
            document.getElementById('status-reports').textContent = assets.filter(a => a.typeKey === 'report').length;
            document.getElementById('status-images').textContent = assets.filter(a => a.typeKey === 'image').length;
            document.getElementById('status-onchain').textContent = assets.filter(a => a.onchain).length;
        }

        // 工具函数
        function generateAssetId() {
            return 'ASSET-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        function generateTxHash() {
            const chars = '0123456789abcdef';
            let hash = '0x';
            for (let i = 0; i < 64; i++) {
                hash += chars[Math.floor(Math.random() * chars.length)];
            }
            return hash;
        }

        function getTypeLabel(type) {
            const labels = {
                'report': '📋 诊断报告',
                'image': '🖼️ 影像文件',
                'data': '📊 数据集',
                'certificate': '🏆 证书/资质',
                'research': '🔬 研究成果'
            };
            return labels[type] || type;
        }

        // Toast
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
<script src="/aimed-bot.js"></script></body>
</html>
