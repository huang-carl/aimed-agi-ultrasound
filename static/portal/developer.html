<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发者中心 - AIMED 充盈视界</title>
    <link rel="icon" type="image/jpeg" href="../aimed-logo-new.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --text: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .card-header h1 { font-size: 1.8em; margin-bottom: 8px; }
        .card-header p { opacity: 0.85; }
        .card-body { padding: 30px; text-align: center; }
        .card-body .icon { font-size: 4em; margin-bottom: 20px; }
        .card-body h2 { color: var(--dark); margin-bottom: 15px; }
        .card-body p { color: var(--text-light); margin-bottom: 25px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .api-list { text-align: left; margin: 25px 0; }
        .api-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: var(--light);
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .api-item .method { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>👨‍💻 开发者中心</h1>
            <p>AIMED 充盈视界 API 接入</p>
        </div>
        <div class="card-body">
            <div class="icon">🚧</div>
            <h2>即将上线</h2>
            <p>开发者中心正在建设中，预计包含：<br>API 文档 · 在线调试 · SDK 下载 · Postman 集合</p>
            
            <div class="api-list">
                <div class="api-item"><span class="method">POST</span> <span>/api/v1/diagnose</span></div>
                <div class="api-item"><span class="method">GET</span> <span>/api/v1/knowledge/search</span></div>
                <div class="api-item"><span class="method">POST</span> <span>/api/v1/segment</span></div>
                <div class="api-item"><span class="method">GET</span> <span>/api/v1/cases/list</span></div>
            </div>
            
            <a href="/portal/" class="btn">← 返回 AI 平台</a>
        </div>
    </div>
</body>
</html>
