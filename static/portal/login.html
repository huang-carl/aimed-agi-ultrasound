<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AIMED 充盈视界</title>
    <link rel="icon" type="image/jpeg" href="../aimed-logo-new.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --accent: #8b5cf6;
            --dark: #1e293b;
            --light: #f8fafc;
            --text: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-width: 480px;
            width: 100%;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 35px 30px;
            text-align: center;
        }
        .login-header img {
            height: 50px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .login-header h1 {
            font-size: 1.6em;
            margin-bottom: 8px;
        }
        .login-header p {
            opacity: 0.85;
            font-size: 0.95em;
        }
        .login-body {
            padding: 30px;
        }
        .tab-container {
            display: flex;
            margin-bottom: 25px;
            background: var(--light);
            border-radius: 10px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s;
            color: var(--text-light);
        }
        .tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--dark);
            font-size: 0.9em;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95em;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85em;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
            cursor: pointer;
        }
        .form-options a {
            color: var(--primary);
            text-decoration: none;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-blockchain {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            margin-top: 12px;
        }
        .btn-blockchain:hover {
            box-shadow: 0 6px 20px rgba(16,185,129,0.4);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--text-light);
            font-size: 0.85em;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: var(--text-light);
        }
        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.85em;
        }
        .back-link a:hover {
            color: var(--primary);
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            padding: 14px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 320px;
            font-size: 0.9em;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--primary); }
        .role-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }
        .role-option {
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
        }
        .role-option:hover {
            border-color: var(--primary);
            background: #f0f7ff;
        }
        .role-option.selected {
            border-color: var(--primary);
            background: #eff6ff;
            color: var(--primary);
            font-weight: 600;
        }
        .role-option .icon {
            font-size: 1.5em;
            margin-bottom: 4px;
        }
        @media (max-width: 500px) {
            .login-body { padding: 20px; }
            .role-select { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="../aimed-logo-new.jpg" alt="AIMED">
            <h1>超声造影人工智能诊断联合实验室</h1>
            <p>安全登录 - 阿尔麦德智慧医疗</p>
        </div>
        <div class="login-body">
            <!-- 登录方式切换 -->
            <div class="tab-container">
                <div class="tab active" onclick="switchTab('password')">🔑 账号密码</div>
                <div class="tab" onclick="switchTab('blockchain')">🔐 区块链身份</div>
            </div>

            <!-- 账号密码登录 -->
            <div class="tab-content active" id="tab-password">
                <div class="form-group">
                    <label>👤 用户名 *</label>
                    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>🔒 密码 *</label>
                    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label>🎯 登录身份 *</label>
                    <div class="role-select" id="roleSelect">
                        <div class="role-option" onclick="selectRole(this, 'doctor')">
                            <div class="icon">👨‍⚕️</div>
                            <div>医生</div>
                        </div>
                        <div class="role-option" onclick="selectRole(this, 'patient')">
                            <div class="icon">👤</div>
                            <div>患者</div>
                        </div>
                        <div class="role-option" onclick="selectRole(this, 'developer')">
                            <div class="icon">👨‍💻</div>
                            <div>开发者</div>
                        </div>
                        <div class="role-option" onclick="selectRole(this, 'admin')">
                            <div class="icon">⚙️</div>
                            <div>管理员</div>
                        </div>
                    </div>
                </div>
                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe" checked> 记住我
                    </label>
                    <a href="#" onclick="showToast('请联系管理员重置密码', 'info'); return false;">忘记密码？</a>
                </div>
                <button class="btn btn-primary" id="loginBtn" onclick="login()">
                    🚀 登录
                </button>
            </div>

            <!-- 区块链身份登录 -->
            <div class="tab-content" id="tab-blockchain">
                <div class="form-group">
                    <label>🔐 身份 ID *</label>
                    <input type="text" id="identityId" placeholder="输入区块链身份 ID（如：ID-XXXXXX）">
                </div>
                <div class="form-group">
                    <label>🎯 登录身份 *</label>
                    <div class="role-select" id="roleSelect2">
                        <div class="role-option" onclick="selectRole(this, 'doctor')">
                            <div class="icon">👨‍⚕️</div>
                            <div>医生</div>
                        </div>
                        <div class="role-option" onclick="selectRole(this, 'patient')">
                            <div class="icon">👤</div>
                            <div>患者</div>
                        </div>
                        <div class="role-option" onclick="selectRole(this, 'developer')">
                            <div class="icon">👨‍💻</div>
                            <div>开发者</div>
                        </div>
                        <div class="role-option" onclick="selectRole(this, 'admin')">
                            <div class="icon">⚙️</div>
                            <div>管理员</div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-blockchain" onclick="loginBlockchain()">
                    🔗 区块链身份验证登录
                </button>
                <p style="text-align:center;margin-top:12px;font-size:0.85em;color:var(--text-light)">
                    通过区块链身份识别页面注册的身份可在此登录
                </p>
            </div>

            <div class="divider">或</div>

            <div class="register-link">
                还没有账号？<a href="/portal/blockchain-identity.html">注册区块链身份</a>
            </div>
            <div class="back-link">
                <a href="/portal/">← 返回 AI 平台</a>
            </div>
        </div>
    </div>

    <script>
        // 当前选择的角色
        let selectedRole = null;

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tab === 'password') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('tab-password').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('tab-blockchain').classList.add('active');
            }
        }

        // 选择角色
        function selectRole(el, role) {
            const parent = el.parentElement;
            parent.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedRole = role;
        }

        // 账号密码登录
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                showToast('请填写用户名和密码', 'error');
                return;
            }
            if (!selectedRole) {
                showToast('请选择登录身份', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:3px;margin:0"></span> 登录中...';

            try {
                // 模拟登录验证
                const loginData = {
                    username: username,
                    role: selectedRole,
                    roleLabel: getRoleLabel(selectedRole),
                    timestamp: new Date().toISOString(),
                    rememberMe: rememberMe
                };

                // 保存登录状态
                localStorage.setItem('loginStatus', JSON.stringify(loginData));
                
                showToast('登录成功！欢迎回来，' + username, 'success');
                
                // 延迟跳转
                setTimeout(() => {
                    window.location.href = getRedirectUrl(selectedRole);
                }, 1000);
            } catch (e) {
                showToast('登录失败：' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 登录';
            }
        }

        // 区块链身份登录
        async function loginBlockchain() {
            const identityId = document.getElementById('identityId').value.trim();
            
            if (!identityId) {
                showToast('请输入身份 ID', 'error');
                return;
            }
            if (!selectedRole) {
                showToast('请选择登录身份', 'error');
                return;
            }

            // 检查身份是否存在
            const identityHistory = JSON.parse(localStorage.getItem('identityHistory') || '[]');
            const identity = identityHistory.find(i => i.id === identityId);
            
            if (!identity) {
                showToast('身份 ID 不存在，请先注册', 'error');
                return;
            }

            const loginData = {
                identityId: identityId,
                role: selectedRole,
                roleLabel: getRoleLabel(selectedRole),
                identity: identity,
                timestamp: new Date().toISOString(),
                authMethod: 'blockchain'
            };

            localStorage.setItem('loginStatus', JSON.stringify(loginData));
            showToast('✅ 区块链身份验证成功！', 'success');

            setTimeout(() => {
                window.location.href = getRedirectUrl(selectedRole);
            }, 1000);
        }

        // 获取角色标签
        function getRoleLabel(role) {
            const labels = {
                'doctor': '👨‍⚕️ 医生',
                'patient': '👤 患者',
                'developer': '👨‍💻 开发者',
                'admin': '⚙️ 管理员'
            };
            return labels[role] || role;
        }

        // 获取跳转 URL
        function getRedirectUrl(role) {
            const redirects = {
                'doctor': '/portal/doctor.html',
                'patient': '/portal/patient.html',
                'developer': '/portal/developer.html',
                'admin': '/portal/'
            };
            return redirects[role] || '/portal/';
        }

        // Toast 通知
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 检查是否已登录
        document.addEventListener('DOMContentLoaded', () => {
            const loginStatus = localStorage.getItem('loginStatus');
            if (loginStatus) {
                const data = JSON.parse(loginStatus);
                // 检查是否过期（24 小时）
                const loginTime = new Date(data.timestamp).getTime();
                const now = Date.now();
                if (now - loginTime < 24 * 60 * 60 * 1000) {
                    // 已登录，跳转到对应页面
                    window.location.href = getRedirectUrl(data.role);
                } else {
                    // 已过期，清除登录状态
                    localStorage.removeItem('loginStatus');
                }
            }
        });
    </script>
</body>
</html>
