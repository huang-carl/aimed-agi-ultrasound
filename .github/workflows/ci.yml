name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy

      - name: Lint with flake8
        run: |
          flake8 agents/ routers/ services/ --max-line-length=100 --ignore=E501,W503

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          DASHSCOPE_API_KEY: test_key_for_ci
          MOCK_MODE: true

      - name: Type check with mypy
        run: |
          mypy agents/ routers/ --ignore-missing-imports
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aimed-agi-ultrasound:${{ github.sha }} -f deploy/Dockerfile .

      - name: Run Docker container health check
        run: |
          docker run -d --name aimed-test -p 8000:8000 aimed-agi-ultrasound:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop aimed-test
          docker rm aimed-test
